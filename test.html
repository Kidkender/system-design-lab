<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vòng Quay Món Ăn</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #1e1e2f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 40px;
            color: #ffd166;
        }

        .wheel-container {
            position: relative;
            width: 500px;
            height: 500px;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff4d4d;
            z-index: 10;
        }

        canvas {
            border-radius: 50%;
            border: 10px solid #fff;
            background: white;
        }

        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 22px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #06d6a0;
            color: white;
            transition: 0.2s;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 25px;
            font-size: 30px;
            font-weight: bold;
            color: #ffd166;
            min-height: 40px;
        }
    </style>
</head>

<body>

    <h1>🎉 Vòng Quay Chọn Món Ăn 🎉</h1>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <button id="spinBtn">QUAY NGAY</button>

    <div class="result" id="result"></div>

    <script>
        const foods = [
            "Phở bò",
            "Hủ tiếu",
            "Bún riêu",
            "Bún bò Huế",
            "Mì trộn",
            "Mì xào",
            "Mì hoành thánh",
            "Bánh canh",
            "Miến gà",
            "Mì Quảng",
            "Hủ tiếu Nam Vang",
            "Bún thịt nướng",
            "Bún mắm",

            "Cơm tấm sườn bì chả",
            "Cơm gà xối mỡ",
            "Cơm sườn nướng",
            "Cơm chiên",
            "Cơm bò lúc lắc",
            "Cơm niêu",
            "Cơm cá kho",
            "Cơm trộn",
            "Cơm cà ri",
            "Cơm vịt quay",
            "Cơm gà quay",
            "Cơm thịt kho",
            "Cơm tấm đặc biệt",

            "Bánh mì thịt",
            "Bánh xèo",
            "Bánh cuốn",
            "Gỏi cuốn",
            "Bánh căn",
            "Bánh ướt",
            "Bánh bèo",
            "Bánh đúc",
            "Bánh hỏi",
            "Bánh tráng nướng",
            "Mì xào giòn",
            "Mì trộn thập cẩm",
            "Bánh bao",

            "Bún đậu mắm tôm",
            "Bún chả",
            "Nem nướng",
            "Chả giò",
            "Cá kho tộ",
            "Canh chua cá",
            "Thịt kho trứng",
            "Sườn nướng",
            "Gà nướng",
            "Vịt quay",
            "Hải sản",
            "Lẩu nhỏ",
            "BBQ"
        ];

        const colors = [
            "#ff6b6b",
            "#feca57",
            "#48dbfb",
            "#1dd1a1",
            "#5f27cd",
            "#ff9f43"
        ];

        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 240;

        const slice = (Math.PI * 2) / foods.length;

        let rotation = 0;
        let spinning = false;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            foods.forEach((food, i) => {
                const angle = i * slice + rotation;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(
                    centerX,
                    centerY,
                    radius,
                    angle,
                    angle + slice
                );

                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();

                ctx.save();

                ctx.translate(centerX, centerY);
                ctx.rotate(angle + slice / 2);

                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";

                ctx.fillText(food, radius - 20, 5);

                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();

            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.fillStyle = "#333";
            ctx.fill();
        }

        drawWheel();

        function spinWheel() {
            if (spinning) return;

            spinning = true;

            const resultEl =
                document.getElementById("result");

            resultEl.innerText = "";

            // random món thắng
            const winnerIndex =
                Math.floor(Math.random() * foods.length);

            // góc mỗi ô
            const sliceDeg =
                360 / foods.length;

            // góc target để ô nằm dưới kim
            const targetDeg =
                (winnerIndex * sliceDeg);

            // quay nhiều vòng + tới ô target
            const extraSpins = 360 * 8;

            // kim nằm ở top => trừ 90deg
            const finalDeg =
                extraSpins +
                (360 - targetDeg) -
                90 -
                (sliceDeg / 2);

            const startRotation = rotation;
            const endRotation =
                rotation +
                (finalDeg * Math.PI / 180);

            const duration = 5000;
            const startTime = performance.now();

            function animate(time) {

                const elapsed =
                    time - startTime;

                const progress =
                    Math.min(elapsed / duration, 1);

                const easeOut =
                    1 - Math.pow(1 - progress, 4);

                rotation =
                    startRotation +
                    (endRotation - startRotation) * easeOut;

                drawWheel();

                if (progress < 1) {

                    requestAnimationFrame(animate);

                } else {

                    spinning = false;

                    const winner =
                        foods[winnerIndex];

                    resultEl.innerText =
                        `🍜 Hôm nay ăn: ${winner}`;
                }
            }

            requestAnimationFrame(animate);
        }
        document
            .getElementById("spinBtn")
            .addEventListener("click", spinWheel);
    </script>

</body>

</html>
