          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Create an explanation
      tags:
      - explanations
  /explanations/{id}:
    delete:
      parameters:
      - description: Explanation UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete an explanation
      tags:
      - explanations
    put:
      consumes:
      - application/json
      parameters:
      - description: Explanation UUID
        in: path
        name: id
        required: true
        type: string
      - description: Explanation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateExplanationRequest'
