basePath: /api/v1
definitions:
  dto.ChoiceCreatedResponse:
    properties:
      id:
        type: string
      isCorrect:
        type: boolean
      label:
        type: string
      nextStepId:
        type: string
      stepId:
        type: string
    type: object
  dto.ChoiceResponse:
    properties:
      consequences:
        items:
          $ref: '#/definitions/dto.ConsequencesResponse'
        type: array
      explanations:
        additionalProperties:
          type: string
        type: object
      id:
        type: string
      impacts:
        items:
          $ref: '#/definitions/dto.ImpactResponse'
        type: array
      isCorrect:
        type: boolean
      label:
        type: string
      nextStepId:
        type: string
    type: object
  dto.ConsequenceCreatedResponse:
    properties:
      choiceId:
        type: string
      id:
        type: string
      keys:
        type: string
      type:
        type: string
      value:
        type: boolean
    type: object
  dto.ConsequencesResponse:
    properties:
      key:
        type: string
      value:
        type: boolean
    type: object
  dto.CreateChoiceRequest:
    properties:
      isCorrect:
        type: boolean
      label:
        minLength: 1
        type: string
      nextStepId:
        type: string
      stepId:
        type: string
    required:
    - label
    - stepId
    type: object
  dto.CreateConsequenceRequest:
    properties:
      choiceId:
        type: string
      keys:
        type: string
      type:
        type: string
      value:
        type: boolean
    required:
    - choiceId
    - keys
    - type
    type: object
  dto.CreateExplanationRequest:
    properties:
      choiceId:
        type: string
      content:
        minLength: 1
        type: string
      level:
        enum:
        - beginner
        - intermediate
        - advanced
        type: string
    required:
    - choiceId
    - content
    - level
    type: object
  dto.CreateImpactRequest:
    properties:
      choiceId:
        type: string
      metric:
        enum:
        - latency
        - cost
        - scalability
        type: string
      type:
        enum:
        - add
        - multiply
        - set
        type: string
      value:
        type: number
    required:
    - choiceId
    - metric
    - type
    type: object
  dto.CreateScenarioRequest:
    properties:
      description:
        maxLength: 500
        type: string
      difficulty:
        enum:
        - easy
        - medium
        - hard
        type: string
      start_step_id:
        type: string
      title:
        minLength: 3
        type: string
    required:
    - title
    type: object
  dto.CreateStepRequest:
    properties:
      context:
        maxLength: 500
        type: string
      orderIndex:
        type: integer
      question:
        minLength: 3
        type: string
      scenarioID:
        type: string
    required:
    - question
    type: object
  dto.ExplanationCreatedResponse:
    properties:
      choiceId:
        type: string
      content:
        type: string
      id:
        type: string
      level:
        type: string
    type: object
  dto.ImpactCreatedResponse:
    properties:
      choiceId:
        type: string
      id:
        type: string
      metric:
        type: string
      type:
        type: string
      value:
        type: number
    type: object
  dto.ImpactResponse:
    properties:
      metric:
        type: string
      type:
        type: string
      value:
        type: number
    type: object
  dto.ScenarioPaginationResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ScenarioResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.ScenarioResponse:
    properties:
      description:
        type: string
      id:
        type: string
      steps:
        items:
          $ref: '#/definitions/dto.StepResponse'
        type: array
      title:
        type: string
    type: object
  dto.SessionResponse:
    properties:
      currentStep:
        $ref: '#/definitions/dto.StepResponse'
      flags:
        additionalProperties:
          type: boolean
        type: object
      id:
        type: string
      metrics:
        additionalProperties:
          format: float64
          type: number
        type: object
      scenarioId:
        type: string
      status:
        type: string
    type: object
  dto.SessionSummaryResponse:
    properties:
      choices:
        items:
          $ref: '#/definitions/dto.UserChoiceSummary'
        type: array
      createdAt:
        type: string
      flags:
        additionalProperties:
          type: boolean
        type: object
      id:
        type: string
      metrics:
        additionalProperties:
          format: float64
          type: number
        type: object
      scenarioId:
        type: string
      status:
        type: string
    type: object
  dto.StartSessionRequest:
    properties:
      scenarioId:
        type: string
      userId:
        type: string
    required:
    - scenarioId
    - userId
    type: object
  dto.StepPaginationResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.StepResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.StepResponse:
    properties:
      choices:
        items:
          $ref: '#/definitions/dto.ChoiceResponse'
        type: array
      context:
        type: string
      id:
        type: string
      question:
        type: string
    type: object
  dto.SubmitChoiceRequest:
    properties:
      choiceId:
        type: string
    required:
    - choiceId
    type: object
  dto.SubmitChoiceResponse:
    properties:
      explanations:
        additionalProperties:
          type: string
        type: object
      feedback:
        type: string
      isCompleted:
        type: boolean
      isCorrect:
        type: boolean
      metrics:
        additionalProperties:
          format: float64
          type: number
        type: object
      nextStep:
        $ref: '#/definitions/dto.StepResponse'
    type: object
  dto.UpdateConsequenceRequest:
    properties:
      keys:
        type: string
      type:
        type: string
      value:
        type: boolean
    required:
    - keys
    - type
    type: object
  dto.UpdateExplanationRequest:
    properties:
      content:
        minLength: 1
        type: string
      level:
        enum:
        - beginner
        - intermediate
        - advanced
        type: string
    required:
    - content
    - level
    type: object
  dto.UpdateImpactRequest:
    properties:
      metric:
        enum:
        - latency
        - cost
        - scalability
        type: string
      type:
        enum:
        - add
        - multiply
        - set
        type: string
      value:
        type: number
    required:
    - metric
    - type
    type: object
  dto.UserChoiceSummary:
    properties:
      choiceId:
        type: string
      explanations:
        additionalProperties:
          type: string
        type: object
      isCorrect:
        type: boolean
      label:
        type: string
      question:
        type: string
      stepId:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Guided System Design Playground — learn system design through decisions
    and consequences.
  title: System Design Lab API
  version: "1.0"
paths:
  /choices:
    post:
      consumes:
      - application/json
      parameters:
      - description: Choice payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateChoiceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ChoiceCreatedResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Create a choice
      tags:
      - choices
  /consequences:
