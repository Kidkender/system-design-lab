            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update an explanation
      tags:
      - explanations
  /impacts:
    post:
      consumes:
      - application/json
      parameters:
      - description: Impact payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateImpactRequest'
      produces:
