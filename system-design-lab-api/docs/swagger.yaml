          schema:
            type: string
      summary: Create a consequence
      tags:
      - consequences
  /consequences/{id}:
    delete:
      parameters:
      - description: Consequence UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete a consequence
      tags:
      - consequences
    put:
      consumes:
      - application/json
      parameters:
      - description: Consequence UUID
        in: path
        name: id
        required: true
        type: string
      - description: Consequence payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateConsequenceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ConsequenceCreatedResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update a consequence
      tags:
      - consequences
  /explanations:
