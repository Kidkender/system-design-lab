  /sessions:
    post:
      consumes:
      - application/json
      parameters:
      - description: Session payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.StartSessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SessionResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Start a new session
      tags:
      - sessions
  /sessions/{id}:
    get:
      parameters:
      - description: Session UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SessionResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Get session by ID
      tags:
      - sessions
  /sessions/{id}/submit:
    post:
      consumes:
      - application/json
      parameters:
      - description: Session UUID
        in: path
        name: id
        required: true
        type: string
      - description: Choice payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.SubmitChoiceRequest'
      produces:
